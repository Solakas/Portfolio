<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#581c87" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background rounded rectangle with sleek gradient -->
  <rect width="512" height="512" rx="140" fill="url(#grad)" />
  
  <!-- Stylized Monogram S P -->
  <g fill="none" stroke="#ffffff" stroke-width="44" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)">
    <!-- 'S' Path -->
    <path d="M 210 160 C 140 160, 140 230, 210 256 C 280 282, 280 352, 210 352 C 150 352, 140 310, 140 310" />
    <!-- 'P' Path -->
    <path d="M 320 352 L 320 160 L 380 160 C 430 160, 430 256, 380 256 L 320 256" />
  </g>
</svg>
